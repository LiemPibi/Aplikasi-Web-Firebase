<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar Kontak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10">
        <div class="card shadow-sm border-0 mb-3">
          <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
            <div>
              <h1 class="h4 mb-1">Daftar Kontak</h1>
              <p id="authStatus" class="mb-0 text-secondary"></p>
            </div>
            <div class="d-flex gap-2">
              <a href="form-kontak.html" class="btn btn-primary btn-sm">Tambah Kontak</a>
              <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <div class="table-responsive">
              <table class="table align-middle" id="contactTable">
                <thead>
                  <tr>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>No. HP</th>
                    <th>Kota</th>
                    <th>Catatan</th>
                    <th class="text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody id="contactTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="contact-list.js"></script>
</body>
</html>
