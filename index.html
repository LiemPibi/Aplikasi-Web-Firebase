<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Kontak Firebase Realtime Database</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="mb-1">Manajemen Kontak</h1>
            <p class="text-secondary mb-4">
              Demo CRUD menggunakan Firebase Realtime Database.
            </p>

            <form id="contactForm" class="row g-3">
              <input type="hidden" id="contactId" />

              <div class="col-md-6">
                <label for="name" class="form-label">Nama</label>
                <input type="text" class="form-control" id="name" placeholder="Contoh: Budi" required />
              </div>

              <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="nama@email.com" required />
              </div>

              <div class="col-md-6">
                <label for="phone" class="form-label">No. HP</label>
                <input type="tel" class="form-control" id="phone" placeholder="08xxxxxxxxxx" required />
              </div>

              <div class="col-md-6">
                <label for="city" class="form-label">Kota</label>
                <input type="text" class="form-control" id="city" placeholder="Contoh: Bandung" required />
              </div>

              <div class="col-12">
                <label for="note" class="form-label">Catatan</label>
                <textarea class="form-control" id="note" rows="2" placeholder="Catatan tambahan" required></textarea>
              </div>

              <div class="col-12 d-flex gap-2">
                <button type="submit" id="submitBtn" class="btn btn-primary">Simpan Data</button>
                <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary d-none">Batal Edit</button>
              </div>
            </form>
          </div>
        </div>

        <div class="card shadow-sm border-0 mt-4">
          <div class="card-body p-4 p-md-5">
            <h2 class="h4 mb-3">Daftar Kontak</h2>
            <div class="table-responsive">
              <table class="table align-middle" id="contactTable">
                <thead>
                  <tr>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>No. HP</th>
                    <th>Kota</th>
                    <th>Catatan</th>
                    <th class="text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody id="contactTableBody">
                  <tr>
                    <td colspan="6" class="text-center text-secondary">Belum ada data.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
