<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Kontak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="card shadow-sm border-0 mb-3">
          <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
            <div>
              <h1 class="h4 mb-1">Form Kontak</h1>
              <p id="authStatus" class="mb-0 text-secondary"></p>
            </div>
            <div class="d-flex gap-2">
              <a href="daftar-kontak.html" class="btn btn-outline-primary btn-sm">Daftar Kontak</a>
              <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
            </div>
          </div>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <form id="contactForm" class="row g-3">
              <input type="hidden" id="contactId" />
              <div class="col-md-6">
                <label for="name" class="form-label">Nama</label>
                <input type="text" class="form-control" id="name" required />
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required />
              </div>
              <div class="col-md-6">
                <label for="phone" class="form-label">No. HP</label>
                <input type="tel" class="form-control" id="phone" required />
              </div>
              <div class="col-md-6">
                <label for="city" class="form-label">Kota</label>
                <input type="text" class="form-control" id="city" required />
              </div>
              <div class="col-12">
                <label for="note" class="form-label">Catatan</label>
                <textarea class="form-control" id="note" rows="2" required></textarea>
              </div>
              <div class="col-12 d-flex gap-2">
                <button type="submit" id="submitBtn" class="btn btn-primary">Simpan Data</button>
                <a href="daftar-kontak.html" class="btn btn-outline-secondary">Batal</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="contact-form.js"></script>
</body>
</html>
