<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - Firebase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container py-5 page-auth">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">
            <h1 class="h3 mb-3">Sign In (Daftar Akun)</h1>
            <form id="registerForm" class="row g-3">
              <div class="col-12">
                <label for="registerEmail" class="form-label">Email</label>
                <input type="email" id="registerEmail" class="form-control" required />
              </div>
              <div class="col-12">
                <label for="registerPassword" class="form-label">Password</label>
                <input type="password" id="registerPassword" class="form-control" minlength="6" required />
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary w-100">Daftar</button>
              </div>
            </form>
            <p class="mt-3 mb-0 text-secondary">
              Sudah punya akun? <a href="login.html">Login di sini</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="register.js"></script>
</body>
</html>
